name: test workflow
on:
  workflow_dispatch:
    branches: [develop]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12.1'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install transformers datasets evaluate numpy mlflow pytest
      - name: Run tests
        run: |
          pytest tests/