name: Deploy app to HuggingFace Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t sentiment-app ./app
      - name: Start container
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: docker run -d -p 7860:7860 -e HF_TOKEN=$HF_TOKEN -e MODEL=divde/sentiment_analysis_classifier --name app sentiment-app
      - name: Wait for health
        run: |
          for i in {1..40}; do
            curl -sf http://localhost:7860/health && break
            sleep 5
          done
      - uses: actions/setup-python@v4
        with: { python-version: '3.12' }
      - run: pip install requests pytest
      - run: pytest tests/test_integration.py
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push app/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          cd app
          git init
          git add .
          git commit -m "deploy: $(date +%Y-%m-%d)"
          git push --force https://divde:$HF_TOKEN@huggingface.co/spaces/divde/sentiment_proj_5 HEAD:main
